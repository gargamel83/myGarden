name: CI

on:
  push:
    branches: [main, iteration-*, test/*, feat/*, fix/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run check
        env:
          NODE_ENV: development

      - run: npm test
        env:
          NODE_ENV: development

      - run: npm run build
        env:
          NODE_ENV: development
